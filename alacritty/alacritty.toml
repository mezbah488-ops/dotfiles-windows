[general]
import = ["themes/tokyo_night_storm.toml"]

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
decorations = "Full"
opacity = 0.8
option_as_alt = "Both"

[font]
normal = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Bold" }
bold   = { family = "JetBrainsMonoNL Nerd Font Mono", style = "ExtraBold" }
size = 13

[terminal]
shell = { program = "pwsh", args = ["-NoLogo"] }
